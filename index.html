<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Spin Wheel with Questions</title>

<style>
  body {
    font-family: Arial, sans-serif;
    text-align: center;
    background: #f2f2f2;
  }

  #wheel-container {
    position: relative;
    width: 400px;
    margin: 30px auto;
  }

  canvas {
    background: white;
    border-radius: 50%;
  }

  /* Arrow */
  .arrow {
    position: absolute;
    top: -10px;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: 15px solid transparent;
    border-right: 15px solid transparent;
    border-bottom: 30px solid red;
    z-index: 10;
  }

  button {
    padding: 12px 25px;
    font-size: 18px;
    cursor: pointer;
  }

  /* Overlay */
  #overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    justify-content: center;
    align-items: center;
  }

  #overlay-content {
    background: white;
    padding: 25px;
    max-width: 400px;
    border-radius: 10px;
    text-align: center;
  }
</style>
</head>

<body>

<h1>🎡 Spin the Wheel</h1>

<div id="wheel-container">
  <div class="arrow"></div>
  <canvas id="wheel" width="400" height="400"></canvas>
</div>

<button onclick="spin()">SPIN</button>

<div id="overlay">
  <div id="overlay-content">
    <h2 id="overlay-title"></h2>
    <p id="overlay-question"></p>
    <button onclick="closeOverlay()">Close</button>
  </div>
</div>

<script>
const wedges = [
  { label: "Math", question: "What is 12 × 8?" },
  { label: "Science", question: "What planet is known as the Red Planet?" },
  { label: "History", question: "Who was the first U.S. president?" },
  { label: "Bonus", question: "Spin again!" },
  { label: "Geography", question: "What is the capital of France?" },
  { label: "Wildcard", question: "Name any animal that lives in water." }
];

const colors = ["#e63946","#457b9d","#2a9d8f","#f4a261","#6d597a","#ffb703"];

const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");
const center = canvas.width / 2;
const radius = center;
let angle = 0;

function drawWheel() {
  const slice = (2 * Math.PI) / wedges.length;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  for (let i = 0; i < wedges.length; i++) {
    ctx.beginPath();
    ctx.fillStyle = colors[i];
    ctx.moveTo(center, center);
    ctx.arc(center, center, radius, angle + i * slice, angle + (i + 1) * slice);
    ctx.fill();

    ctx.save();
    ctx.translate(center, center);
    ctx.rotate(angle + (i + 0.5) * slice);
    ctx.textAlign = "right";
    ctx.fillStyle = "#fff";
    ctx.font = "16px Arial";
    ctx.fillText(wedges[i].label, radius - 10, 5);
    ctx.restore();
  }
}

function spin() {
  const spinAngle = Math.random() * 3000 + 2000;
  const spinTime = 3500;
  const start = performance.now();

  function animate(time) {
    const elapsed = time - start;
    if (elapsed < spinTime) {
      angle += spinAngle / spinTime;
      drawWheel();
      requestAnimationFrame(animate);
    } else {
      finishSpin();
    }
  }
  requestAnimationFrame(animate);
}

function finishSpin() {
  const slice = (2 * Math.PI) / wedges.length;
  const normalizedAngle = (2 * Math.PI - (angle % (2 * Math.PI)));
  const index = Math.floor(normalizedAngle / slice) % wedges.length;

  showQuestion(wedges[index]);
}

function showQuestion(wedge) {
  document.getElementById("overlay-title").innerText = wedge.label;
  document.getElementById("overlay-question").innerText = wedge.question;
  document.getElementById("overlay").style.display = "flex";
}

function closeOverlay() {
  document.getElementById("overlay").style.display = "none";
}

drawWheel();
</script>

</body>
</html>
